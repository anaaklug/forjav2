<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Forja — Loja</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <meta name="theme-color" content="#0d0b14" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <img id="splash-logo" src="" alt="Forja" />
    <div class="splash-bar-track">
      <div class="splash-bar-fill"></div>
    </div>
  </div>

  <!-- BOTÃO DE TEMA -->
  <button id="theme-toggle" title="Alternar tema">🌙</button>


  <nav class="nav">
    <div class="container">
      <div class="nav-inner">
        <span class="nav-logo forja-title">⚒ FORJA</span>
        <ul class="nav-links">
          <li><a href="index.html">🏠 <span>Início</span></a></li>
          <li><a href="loja.html" class="active">🛒 <span>Loja</span></a></li>
          <li><a href="conquistas.html">🏆 <span>Conquistas</span></a></li>
          <li><a href="personagem.html">⚔️ <span>Herói</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container page-enter" style="padding-top:28px;padding-bottom:60px;">

    <!-- Saldo de gold -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <h2>🛒 Loja do Ferreiro</h2>
      <div style="
        display:flex;align-items:center;gap:10px;
        background:var(--bg-card);border:1px solid var(--border);
        border-radius:var(--radius-md);padding:10px 18px;
      ">
        <span style="font-size:1.3rem;">💰</span>
        <div>
          <div id="shop-gold" style="font-family:var(--font-display);font-size:1.2rem;color:var(--gold-color);font-weight:700;">0</div>
          <div style="font-family:var(--font-display);font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;">GOLD DISPONÍVEL</div>
        </div>
      </div>
    </div>

    <!-- Catálogo -->
    <div id="shop-catalog" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
      gap:16px;
    ">
      <!-- Renderizado por ShopUI -->
    </div>

    <!-- Inventário equipado -->
    <div class="divider" style="margin-top:40px;">🎒 Inventário</div>
    <div id="inventory-list" style="
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
      gap:12px;
    ">
      <!-- Renderizado por ShopUI -->
    </div>

  </main>

  <div id="toast-container"></div>

  <script src="js/theme.js"></script>
  <script src="js/events.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/player.js"></script>
  <script src="js/habits.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/shop-ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
